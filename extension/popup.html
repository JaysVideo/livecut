<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LiveCut Stream Sniffer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Barlow+Condensed:wght@700;900&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0c; --bg2: #111115; --bg3: #18181f;
    --border: #2a2a35; --accent: #e8ff47; --accent2: #ff6b35;
    --accent3: #47c6ff; --text: #e8e8f0; --text2: #888898;
    --text3: #555565; --red: #ff4545;
  }
  body { width: 360px; background: var(--bg); color: var(--text); font-family: 'Space Mono', monospace; font-size: 12px; }
  header { display: flex; align-items: center; gap: 10px; padding: 12px 14px; border-bottom: 1px solid var(--border); background: var(--bg2); }
  .logo { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 900; letter-spacing: 0.06em; color: var(--text); }
  .logo span { color: var(--accent); }
  .badge { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.1em; padding: 2px 7px; border-radius: 2px; border: 1px solid var(--accent3); color: var(--accent3); margin-left: auto; }
  .list { max-height: 320px; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 6px; }
  .empty { padding: 32px 16px; text-align: center; color: var(--text3); font-size: 11px; line-height: 1.8; }
  .empty strong { display: block; font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 0.06em; color: var(--text2); margin-bottom: 6px; }
  .stream { background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; padding: 8px 10px; display: flex; flex-direction: column; gap: 6px; }
  .stream-tab { font-size: 9px; color: var(--text3); font-family: 'Barlow Condensed', sans-serif; letter-spacing: 0.06em; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .stream-url { font-size: 10px; color: var(--text2); word-break: break-all; line-height: 1.5; max-height: 60px; overflow: hidden; }
  .stream-actions { display: flex; gap: 6px; }
  button { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; border: 1px solid var(--border); background: var(--bg3); color: var(--text); padding: 4px 10px; border-radius: 3px; cursor: pointer; font-size: 10px; transition: all 0.1s; flex: 1; }
  .btn-copy { border-color: var(--text3); color: var(--text2); }
  .btn-copy:hover { border-color: var(--text2); color: var(--text); }
  .btn-copy.copied { border-color: var(--accent); color: var(--accent); }
  .btn-open { border-color: var(--accent); color: var(--accent); background: rgba(232,255,71,0.06); }
  .btn-open:hover { background: rgba(232,255,71,0.12); }
  footer { padding: 8px 14px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--bg2); }
  .footer-note { font-size: 10px; color: var(--text3); }
  .btn-clear { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; border: none; background: none; color: var(--text3); cursor: pointer; padding: 2px 4px; border-radius: 2px; }
  .btn-clear:hover { color: var(--red); }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg2); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>
<header>
  <div class="logo">LIVE<span>CUT</span></div>
  <div style="font-size:10px;color:var(--text3);margin-left:4px;">Stream Sniffer</div>
  <div class="badge" id="count-badge">0 streams</div>
</header>
<div class="list" id="stream-list">
  <div class="empty">
    <strong>No streams detected</strong>
    Navigate to a page that plays HLS video.<br>
    Streams will appear here automatically.
  </div>
</div>
<footer>
  <span class="footer-note">Detected across all tabs</span>
  <button class="btn-clear" id="btn-clear">Clear</button>
</footer>
<script src="popup.js"></script>
</body>
</html>
